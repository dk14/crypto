<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaqui Explorer</title>

<style>
:root {
    --bg: #0b0d10;
    --panel: #151922;
    --border: #2a3140;
    --text: #e8edf5;
    --muted: #8d96a8;
    --accent: #5ea1ff;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #18202d, var(--bg));
    color: var(--text);
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;
}

.app {
    width: min(900px, 95vw);
    height: min(700px, 90vh);

    background: rgba(21,25,34,.9);
    border: 1px solid var(--border);
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    overflow: hidden;

    box-shadow: 0 20px 60px rgba(0,0,0,.45);
}

.header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
}

.title {
    font-size: 22px;
    font-weight: 700;
}

.subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
}


.search-area {
    padding: 20px;
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    background: #0f131a;
    color: var(--text);

    border: 1px solid var(--border);
    border-radius: 12px;

    padding: 14px 16px;
    font-size: 16px;
    outline: none;
}

input:focus {
    border-color: var(--accent);
}


button {
    background: var(--accent);
    color: white;

    border: none;
    border-radius: 12px;

    padding: 0 22px;
    font-weight: 600;
    cursor: pointer;

    transition: .2s;
}

button:hover {
    filter: brightness(1.15);
}


.results {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 20px;
}


.result {
    background: #10151d;
    border: 1px solid var(--border);

    border-radius: 12px;
    padding: 16px;

    margin-bottom: 12px;
}


.result-title {
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
}

.result-text {
    color: #c8d0dc;
    line-height: 1.5;
}


.status {
    padding: 12px 20px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
}
</style>
</head>


<body>

<div class="app">

    <div class="header">
        <div class="title">Yaqui Explorer</div>
        <div class="subtitle">
            Lightweight keyword search interface
        </div>
    </div>


    <div class="search-area">
        <input 
            id="query"
            placeholder="Search Yaqui knowledge..."
            autocomplete="off"
        >

        <button onclick="runSearch()">
            Search
        </button>
    </div>


    <div id="results" class="results">
        <div class="result">
            <div class="result-title">
                Ready
            </div>
            <div class="result-text">
                Enter a keyword to query Yaqui.
            </div>
        </div>
    </div>


    <div id="status" class="status">
        Yaqui initialized
    </div>

</div>


<script src="./yaqui.js"></script>

<script>

const input = document.getElementById("query");
const results = document.getElementById("results");
const status = document.getElementById("status");


input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        runSearch();
    }
});


async function runSearch() {

    const q = input.value.trim();

    if (!q) return;


    status.textContent = "Searching...";


    try {

        /*
          Expected interface:

          yaqui.search("keyword")

          returning:
          [
            {
              title:"...",
              text:"..."
            }
          ]

        */

        const data = await yaqui.search(q);


        results.innerHTML = "";


        if (!data || data.length === 0) {

            results.innerHTML = `
            <div class="result">
                <div class="result-title">
                    No matches
                </div>
                <div class="result-text">
                    Nothing found for "${q}"
                </div>
            </div>`;

        } else {

            for (const item of data) {

                results.innerHTML += `
                <div class="result">

                    <div class="result-title">
                        ${escapeHTML(item.title ?? "Result")}
                    </div>

                    <div class="result-text">
                        ${escapeHTML(item.text ?? "")}
                    </div>

                </div>`;
            }
        }


        status.textContent =
            `${data?.length ?? 0} results`;

    }
    catch(err) {

        status.textContent =
            "Yaqui error: " + err.message;

    }

}


function escapeHTML(str) {

    return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

</script>

</body>
</html>
