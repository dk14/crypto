<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doomsday Explorer – Intro</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#111;font-family:"Arial",sans-serif;}
  canvas{display:block;width:100%;height:100%;}

  /* Panel that mimics the site’s visual language */
  .panel{
    position:absolute;top:30%;left:50%;transform:translate(-50%,-30%);
    text-align:center;color:#fff;pointer-events:none;
  }
  .panel h1{
    margin:0 0 .8rem;
    font-size:3rem;
    text-shadow:0 0 8px rgb(255, 0, 0);
  }

  .panel h3{
    margin:0 0 .8rem;
    font-size:1.5rem;
    text-shadow:0 0 8px rgb(36, 25, 25);
  }
  .panel a{
    pointer‑events:auto;            /* re‑enable clicks */
    display:inline-block;
    padding:.8rem 2rem;
    margin-top:.4rem;
    font-size:1.2rem;
    color:#111;
    background:rgb(246, 255, 0);                /* same cyan hue as the page */
    border:none;border-radius:.4rem;
    text-decoration:none;
    box-shadow:0 0 12px rgb(255, 0, 0);
    transition:background .2s,transform .2s;
  }
  .panel a:hover{
    background:#0dd;
    transform:translateY(-2px);
  }
</style>
</head>
<body>

<div class="panel">
  <h1>Doomsday Explorer</h1>
  <h3>Early-warning system for Bitcoin wallets</h3>
  <a href="https://dk14.github.io/crypto/" target="_blank">Enter  →</a>
</div>

<canvas id="noise"></canvas>

<script>
// ---------- deterministic 2‑D value noise ----------
const seed = 0x1a2b3c4d;
function hash(x,y){
  let h = seed ^ (x*374761393) ^ (y*668265263);
  h = (h ^ (h>>13)) * 1274126177;
  return (h ^ (h>>16)) >>> 0;
}
function noise2D(x,y){
  const x0 = Math.floor(x), y0 = Math.floor(y);
  const x1 = x0+1, y1 = y0+1;
  const sx = x-x0, sy = y-y0;
  const n00 = hash(x0,y0)/0xffffffff;
  const n10 = hash(x1,y0)/0xffffffff;
  const n01 = hash(x0,y1)/0xffffffff;
  const n11 = hash(x1,y1)/0xffffffff;
  const ix0 = lerp(n00,n10,sx);
  const ix1 = lerp(n01,n11,sx);
  return lerp(ix0,ix1,sy);
}
function lerp(a,b,t){return a+t*(b-a);}

// ---------- canvas drawing ----------
const canvas = document.getElementById('noise');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}
window.addEventListener('resize',resize);
resize();

function draw(){
  const {width,height}=canvas;
  const img = ctx.createImageData(width,height);
  const d = img.data;
  const scale = 0.01, octaves = 5, pers = 0.5;

  for(let y=0;y<height;y++){
    for(let x=0;x<width;x++){
      let amp=1, freq=1, val=0;
      for(let o=0;o<octaves;o++){
        val += noise2D(x*scale*freq, y*scale*freq)*amp;
        amp *= pers; freq *= 2;
      }
      const col = Math.floor(val*255);
      const i = (y*width + x)*4;
      d[i]=col; d[i+1]=col*0.8; d[i+2]=col*0.6; d[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}

// optional subtle animation – comment out for a static background
let off=0;
function animate(){
  off+=0.2;
  const {width,height}=canvas;
  const img = ctx.createImageData(width,height);
  const d = img.data;
  const scale = 0.01, octaves = 5, pers = 0.5;

  for(let y=0;y<height;y++){
    for(let x=0;x<width;x++){
      let amp=1, freq=1, val=0;
      for(let o=0;o<octaves;o++){
        val += noise2D((x+off)*scale*freq, (y+off)*scale*freq)*amp;
        amp *= pers; freq *= 2;
      }
      const col = Math.floor(val*255);
      const i = (y*width + x)*4;
      d[i]=col; d[i+1]=col*0.8; d[i+2]=col*0.6; d[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
  requestAnimationFrame(animate);
}
animate();   // remove this line if you prefer a fully static background
</script>

</body>
</html>
