const gcd = (a,b) => {

    if (b > a) {var temp = a; a = b; b = temp;}
    while (true) {
        if (b == BigInt(0)) return a
        a %= b
        if (a == BigInt(0)) return b
        b %= a
    }
}


const coprime = n => {
    let k = BigInt("387869")
    while (gcd(k, n) !== BigInt(1)) {
        k++
    
    }
    return k
}

const mod_inverse = (a, n) => {
    let [t, newt] = [BigInt(0), BigInt(1)]
    let [r, newr] = [n, a]

    while (newr !== BigInt(0)) {
        const quotient = r / newr
        const t_ = newt
        newt = t - quotient * newt
        t = t_

        const r_ = newr
        newr = r - quotient * newr
        r = r_
        
    }
    
    if (t < BigInt(0)) {
        t = t + n
    }   
    
    return t
}

            k = k - BigInt(1)
            steps++
        }

        k /= BigInt(2)
        steps++
        
    }
    console.log("steps(forward)=" + steps)
    return ((x % n) * (y % n)) % n

      
}

function bigintToBitPositions(bigint) {
    const positions = [];
    let index = 0;
    while (bigint > 0n) {
        if (bigint & 1n) {
            positions.push(index);
        }
        bigint >>= 1n; // Shift right by 1
        index++;
    }
    return positions;
}

    const pos = bigintToBitPositions(x)
    if (pos.length > 1) {

    } else {

}
